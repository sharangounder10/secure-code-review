name: Secure Code Review – Unified SonarQube Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scans:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # ================================
    # SEMGREP → SARIF
    # ================================
    - name: Run Semgrep
      run: |
        pip install semgrep
        semgrep scan --config p/ci --sarif > reports/semgrep.sarif

    # ================================
    # CODEQL → SARIF
    # ================================
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, python

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        output: reports
        format: sarif

    # ================================
    # BANDIT → JSON
    # ================================
    - name: Bandit Scan
      run: |
        pip install bandit
        bandit -r . -f json -o reports/bandit.json

    # ================================
    # ESLINT → JSON
    # ================================
    - name: ESLint Security Scan
      run: |
        npm install
        npm install eslint eslint-plugin-security --save-dev
        npx eslint . -f json -o reports/eslint.json || true

    # ================================
    # OWASP DEPENDENCY CHECK → XML
    # ================================
    - name: Dependency Check
      uses: dependency-check/Dependency-Check_Action@v3
      with:
        project: "secure-code-review"
        path: "."
        format: "XML"
        out: "reports"

    # ================================
    # GITLEAKS → SARIF
    # ================================
    - name: Gitleaks Scan
      uses: gitleaks/gitleaks-action@v2
      with:
        args: detect --report-format sarif --report-path reports/gitleaks.sarif

    # ================================
    # SONAR SCANNER CLI (IMPORT ALL)
    # ================================
    - name: SonarScanner CLI
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        sonar-scanner \
        -Dsonar.projectKey=secure-code-review \
        -Dsonar.sources=. \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.login=$SONAR_TOKEN \
        -Dsonar.externalIssuesReportPaths=reports/semgrep.sarif,reports/codeql.sarif,reports/bandit.json,reports/eslint.json,reports/dependency-check.xml,reports/gitleaks.sarif
