name: Security Scans

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1. CHECKOUT CODE
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # 2. PREPARE REPORTS DIR
    # -------------------------
    - name: Create reports directory
      run: mkdir -p reports

    # -------------------------
    # 3. SEMGREP (CLI)
    # -------------------------
    - name: Run Semgrep
      run: |
        pip install semgrep
        semgrep scan \
          --config p/owasp-top-ten \
          --sarif \
          --output reports/semgrep.sarif \
          .

    # -------------------------
    # 4. CODEQL (ADVANCED SAST)
    # -------------------------
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript, python

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        output: reports/codeql

    # -------------------------
    # 5. BANDIT (PYTHON)
    # -------------------------
    - name: Run Bandit
      run: |
        pip install bandit
        bandit -r . -f json -o reports/bandit.json || true

    # -------------------------
    # 6. ESLINT + NODE SECURITY
    # -------------------------
    - name: Run ESLint
      run: |
        npm install eslint eslint-plugin-security --save-dev || true
        npx eslint . -f json -o reports/eslint.json || true

    # -------------------------
    # 7. OWASP DEPENDENCY-CHECK
    # -------------------------
    - name: OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: secure-code-review
        path: .
        format: XML
        out: reports

    # -------------------------
    # 9. SONARQUBE IMPORT
    # -------------------------
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=secure-code-review
          -Dsonar.sources=.
          -Dsonar.externalIssuesReportPaths=reports/semgrep.sarif,reports/codeql/*.sarif,reports/bandit.json,reports/eslint.json,reports/dependency-check-report.xml,reports/gitleaks.sarif
