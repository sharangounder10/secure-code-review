name: Security Scans

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 🔑 REQUIRED for CodeQL + security uploads
permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    runs-on: ubuntu-latest

    steps:
    # -------------------------
    # 1️⃣ CHECKOUT CODE
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # 2️⃣ SEMGREP (STATIC RULES)
    # -------------------------
    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: p/owasp-top-ten
        generateSarif: true
      env:
        SEMGREP_APP_TOKEN: ""

    - name: Save Semgrep report
      run: |
        mkdir -p reports
        mv semgrep.sarif reports/semgrep.sarif

    # -------------------------
    # 3️⃣ CODEQL (ADVANCED ANALYSIS)
    # -------------------------
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: javascript, python

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        output: reports/codeql

    # -------------------------
    # 4️⃣ BANDIT (PYTHON SECURITY)
    # -------------------------
    - name: Run Bandit
      run: |
        pip install bandit
        bandit -r . -f json -o reports/bandit.json || true

    # -------------------------
    # 5️⃣ ESLINT + NODE SECURITY
    # -------------------------
    - name: Run ESLint
      run: |
        npm install eslint eslint-plugin-security --save-dev || true
        npx eslint . -f json -o reports/eslint.json || true

    # -------------------------
    # 6️⃣ OWASP DEPENDENCY-CHECK
    # -------------------------
    - name: OWASP Dependency-Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "secure-code-review"
        path: "."
        format: "XML"
        out: "reports"

    # -------------------------
    # 7️⃣ GITLEAKS (SECRETS)
    # -------------------------
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        args: detect --source . --report-format sarif --report-path reports/gitleaks.sarif
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # -------------------------
    # 8️⃣ SONARSCANNER CLI
    # -------------------------
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=secure-code-review
          -Dsonar.sources=.
          -Dsonar.externalIssuesReportPaths=
          reports/semgrep.sarif,
          reports/codeql/*.sarif,
          reports/bandit.json,
          reports/eslint.json,
          reports/dependency-check-report.xml,
          reports/gitleaks.sarif
